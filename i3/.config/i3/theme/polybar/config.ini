;; Global WM Settings

[global/wm]
margin-bottom = 0
margin-top = 0

include-file = ../system.ini
include-file = ./colors.ini
include-file = ./decor.ini
include-file = ./modules.ini

[section/base]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = false

bottom = false
fixed-center = true

;;width = 100%
width = 100%
height = 26
offset-x = 0
offset-y = 0

background = ${color.BACKGROUND}
foreground = ${color.FOREGROUND}

radius-top = 0.0
radius-bottom = 0.0

line-size = 2
line-color = ${color.ACCENT}

border-size = 6
border-color = ${color.BACKGROUND}

padding = 1
module-margin-left = 0
module-margin-right = 0

font-5 = "Noto Sans CJK JP Medium:size=10;2"
font-0 = "JetBrains Mono:bold:size=10;3"
;; icon fonts
font-1 = "Symbols Nerd Font:size=12;3"
font-2 = "Symbols Nerd Font:size=20;4"
;;
font-3 = "Iosevka Nerd Font:bold:size=12;4"
font-4 = "archcraft:size=14;4"

separator =
spacing = 0

dim-value = 1.0

wm-name = i3
locale = 

tray-position = right
tray-detached = false
tray-maxsize = 16
tray-transparent = false
tray-background = ${color.BACKGROUND}
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 0
tray-scale = 1.0

wm-restack = i3

enable-ipc = true

[bar/main]
inherit = section/base 

modules-left = menu dot LD i3 RD dot cpu sep sep memory sep sep filesystem sep sep temperature
;;modules-center = spotify sep spotify-prev sep spotify-play-pause sep spotify-next
modules-center = spotify-another 
modules-right = bluetooth sep vpn ethernet dot LD date RD sep sep sysmenu
;;height = 25

[bar/secondary]
inherit = section/base

modules-left = LD i3 RD dot LD title-long RD 
;;modules-center = spotify sep spotify-prev sep spotify-play-pause sep spotify-next
modules-center = spotify-another-long
modules-right = LD date RD 

;;height = 23

;; disables the tray on the bar
tray-position = 


[settings]
throttle-output = 5
throttle-output-for = 10
throttle-input-for = 30

screenchange-reload = false

compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

